server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;

    # Ocultar versão do Nginx
    server_tokens off;

    location / {
        index index.html index.htm;
        try_files $uri $uri/ /index.html;

        # Security Headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        # CSP restrita (permite self, data e blob para fontes/imagens, unsafe-inline necessário para alguns scripts/estilos)
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' http://localhost:5002;" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    }

    # Controle de cache para assets estáticos
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
    }
}
